<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="100%" height="100%">
  <defs>
    <linearGradient id="brandRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff333d" />
      <stop offset="100%" stop-color="#b80f16" />
    </linearGradient>
  </defs>
  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Gear Ring -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="url(#brandRedGrad)" stroke-width="3.5" stroke-dasharray="6 2" />
    <circle cx="30" cy="30" r="15" fill="none" stroke="#1a1a1e" stroke-width="2" />
    <!-- Inner Cross Spokes -->
    <path d="M 30,15 L 30,45 M 15,30 L 45,30" stroke="#1a1a1e" stroke-width="2" stroke-linecap="round" />
    <!-- Speed Wing -->
    <path d="M 30,22 C 45,18 55,26 62,38 C 48,34 38,36 30,22 Z" fill="url(#brandRedGrad)" />
    <!-- Small Center Pin -->
    <circle cx="30" cy="30" r="4" fill="url(#brandRedGrad)" />
  </g>
  <!-- Brand Name -->
  <text x="85" y="40" font-family="'Outfit', sans-serif" font-weight="900" font-size="30" fill="#1a1a1e" letter-spacing="1.5">PARAS</text>
  <text x="85" y="58" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ff333d" letter-spacing="5">AUTO PARTS</text>
</svg>
